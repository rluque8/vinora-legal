<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Wine background — matches the app icon -->
    <linearGradient id="vl-bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#B8253D"/>
      <stop offset="55%" stop-color="#7A1828"/>
      <stop offset="100%" stop-color="#42101A"/>
    </linearGradient>
    <!-- Warm top-left glow -->
    <radialGradient id="vl-glow" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#FFC57A" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#42101A" stop-opacity="0"/>
    </radialGradient>
    <!-- Puffy cream V gradient -->
    <linearGradient id="vl-v" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#FFF8E8"/>
      <stop offset="100%" stop-color="#F0DCB6"/>
    </linearGradient>
    <!-- Glossy gold drop -->
    <radialGradient id="vl-drop" cx="0.35" cy="0.3" r="0.75">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#FFF1B0"/>
      <stop offset="60%" stop-color="#F4C24E"/>
      <stop offset="100%" stop-color="#7A5A1E"/>
    </radialGradient>
  </defs>

  <!-- Rounded square wine background (iOS icon shape) -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#vl-bg)"/>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#vl-glow)"/>

  <!-- The chunky V — centered, with drop hanging below -->
  <path
    d="M 14 17
       C 14 15.4, 15.4 14, 17.2 14
       L 21.4 14
       C 23 14, 24.2 15, 24.8 16.6
       L 30.8 35
       C 31 35.6, 31.4 36, 32 36
       C 32.6 36, 33 35.6, 33.2 35
       L 39.2 16.6
       C 39.8 15, 41 14, 42.6 14
       L 46.8 14
       C 48.6 14, 50 15.4, 50 17
       C 50 17.6, 49.9 18, 49.7 18.6
       L 39.4 44
       C 38.3 46.8, 35.4 48.6, 32 48.6
       C 28.6 48.6, 25.7 46.8, 24.6 44
       L 14.3 18.6
       C 14.1 18, 14 17.6, 14 17 Z"
    fill="url(#vl-v)"/>

  <!-- Gold drop below the V -->
  <circle cx="32" cy="53.2" r="3.6" fill="url(#vl-drop)"/>
  <!-- Small white highlight on drop -->
  <ellipse cx="30.8" cy="52.2" rx="1" ry="0.7" fill="white" opacity="0.75"/>
</svg>
